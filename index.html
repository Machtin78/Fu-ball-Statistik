.c{max-width:520px;margin:0 auto}
.nav{display:flex;gap:8px;margin-bottom:10px}
.nav button{flex:1;padding:12px;border:none;border-radius:10px;background:rgba(0,0,0,.46);color:#fff;font-weight:700;cursor:pointer}
.nav button.active{background:#1565c0}
.page{display:none}.page.active{display:block}
.sec{padding:4px 0 5px;margin-bottom:2px}
.box,.sec h2,#htLabel,#timer,#nsLabel,.tmr label,.log,.subtle,.seasonHead{background:rgba(0,0,0,.42);border-radius:8px}
.sec h2{display:inline-block;padding:4px 10px;font-size:.95em;text-transform:uppercase;letter-spacing:.35px;margin-bottom:4px}
#timerWrap{display:flex;justify-content:center;align-items:baseline;gap:8px;flex-wrap:wrap}
#timer{font-size:2.5em;font-family:monospace;padding:4px 12px;background:rgba(0,0,0,.52);font-weight:700}
#htLabel{display:inline-block;padding:4px 10px;font-size:.95em;text-transform:uppercase;letter-spacing:.35px;margin-bottom:4px;font-weight:700}
#nsLabel{font-size:1.1em;font-family:monospace;padding:4px 10px;background:rgba(0,0,0,.52);color:#ffd180;min-height:1.2em}
#btnStart,.actionBtn{display:block;width:100%;padding:13px;border:none;border-radius:10px;color:#fff;font-size:1.05em;font-weight:700;cursor:pointer;margin-top:6px}
#btnStart{background:#2e7d32} #btnStart.run{background:#e65100} #btnStart.pau{background:#1976d2} #btnStart.ns{background:#d32f2f} #btnStart.next{background:#6a1b9a} #btnStart.done{background:#455a64}
.actionBtn.gray{background:#78909c}.actionBtn.blue{background:#1565c0}
.teamRow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.ti,.tm,.playerName,.playerNo,.quickNo{padding:10px;border:1px solid rgba(255,255,255,.35);border-radius:8px;background:rgba(255,255,255,.92);font-size:.95em;color:#111}
.ti,.playerName{flex:1}.tc{width:42px;height:40px;border:none;border-radius:8px;background:#fff;cursor:pointer}.tm{width:90px;text-align:center;font-weight:700}
.quickNo{width:92px;text-align:center;font-weight:700;padding:8px 6px}
.tmr{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:4px}.tmr label{padding:4px 8px}
.rw{display:flex;align-items:center;justify-content:center;gap:8px}
.rc{min-width:56px;padding:6px 8px;border-radius:8px;background:rgba(0,0,0,.48);font:700 2.05em monospace;text-align:center}
.bh,.ba{border:none;border-radius:8px;padding:10px 24px;font-size:1.15em;font-weight:700;cursor:pointer;min-width:88px;height:46px;color:#fff}
.bh{background:var(--hc)} .ba{background:var(--ac)}
.log{font-size:.78em;margin-top:4px;padding:4px 8px;border-top:1px solid rgba(255,255,255,.25)} .log:empty{display:none}
.teamTable{width:100%;border-collapse:separate;border-spacing:0 6px} .teamTable th{padding:8px 6px;font-size:.85em} .playerNo{width:72px;text-align:center;font-weight:700}
.subtle{padding:8px 10px;margin-bottom:8px;font-size:.9em;line-height:1.35}
.seasonCard{background:rgba(0,0,0,.28);padding:10px;border-radius:12px;margin-bottom:8px}
.seasonHead{padding:6px 8px;margin-bottom:8px;display:inline-block}
.seasonGrid{width:100%;border-collapse:collapse;background:rgba(0,0,0,.22)}
.seasonGrid th,.seasonGrid td{border:1px solid rgba(255,255,255,.75);padding:6px 8px;text-align:center}
.seasonGrid th{background:rgba(0,0,0,.42)}
.seasonGrid td.name{text-align:left}
.swapRow{display:flex;gap:8px;justify-content:center;align-items:center;margin-top:4px;flex-wrap:wrap}

.playerPromptOverlay{position:fixed;inset:0;background:rgba(0,0,0,.55);display:none;align-items:center;justify-content:center;padding:18px;z-index:9999}
.playerPromptOverlay.active{display:flex}
.playerPromptBox{width:min(320px,100%);background:rgba(18,18,18,.96);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:16px;box-shadow:0 12px 30px rgba(0,0,0,.35);text-align:center}
.playerPromptBox h3{font-size:1em;margin-bottom:10px;letter-spacing:.2px}
.playerPromptBox .quickNo{width:100%;font-size:1.2em;padding:12px 10px;margin-bottom:12px}
.playerPromptActions{display:flex;gap:8px;justify-content:center}
.playerPromptActions button{flex:1}
.swapArrow{font-weight:700;background:rgba(0,0,0,.42);padding:8px 10px;border-radius:8px}
</style>
</head>
<body>
<div class="c">
  <div class="nav">
    <button id="tabBtn_spieltag" class="active" onclick="showPage('spieltag')">Spieltag</button>
    <button id="tabBtn_team" onclick="showPage('team')">Mein Team</button>
    <button id="tabBtn_saison" onclick="showPage('saison')">Saison</button>
  </div>

  <section id="page_spieltag" class="page active">
    <div class="sec" style="text-align:center">
      <div id="htLabel">1. Halbzeit</div>
      <div id="timerWrap"><div id="timer">00:00</div><div id="nsLabel"></div></div>
      <div class="tmr" id="tRow"><label>Minuten:</label><input class="tm" id="hM" type="number" value="45" min="1" max="120"></div>
      <button id="btnStart" type="button" onclick="tA()">Start</button>
    </div>

    <div class="sec">
      <h2>Teams</h2>
      <datalist id="teamSuggestions"></datalist>
      <div class="teamRow"><input list="teamSuggestions" class="ti" id="tH" type="text" placeholder="Heimmannschaft" oninput="saveTeamNames()"><input class="tc" type="color" id="cH" value="#c2185b" onchange="applyColors()"></div>
      <div class="teamRow"><input list="teamSuggestions" class="ti" id="tAName" type="text" placeholder="Auswärtsmannschaft" oninput="saveTeamNames()"><input class="tc" type="color" id="cA" value="#1e88e5" onchange="applyColors()"></div>
    </div>

    <div id="statsWrap"></div>

    <div class="sec">
      <h2>Auswechslung</h2>
      <div class="swapRow">
        <input class="quickNo" id="swapOut" type="number" placeholder="Raus" inputmode="numeric">
        <div class="swapArrow">→</div>
        <input class="quickNo" id="swapIn" type="number" placeholder="Rein" inputmode="numeric">
      </div>
      <button class="actionBtn gray" type="button" onclick="addSubstitution()">Auswechslung speichern</button>
      <div class="log" id="log_substitutions"></div>
    </div>

    <div class="sec">
      <button class="actionBtn gray" type="button" onclick="uZ()">Letzte Aktion rückgängig</button>
      <button class="actionBtn gray" type="button" onclick="rA()">Alles zurücksetzen</button>
      <button class="actionBtn blue" type="button" onclick="exportWorkbook()">Excel Export</button>
    </div>
  </section>

  <section id="page_team" class="page">
    <div class="sec">
      <h2>Mein Team</h2>
      <div class="subtle">Nummern und Spielernamen werden gespeichert und später automatisch verwendet.</div>
      <table class="teamTable">
        <thead><tr><th>Nr.</th><th>Name</th></tr></thead>
        <tbody id="teamRows"></tbody>
      </table>
      <button class="actionBtn blue" type="button" onclick="savePlayers(true)">Team speichern</button>
    </div>
  </section>

  <section id="page_saison" class="page">
    <div class="sec">
      <h2>Saison</h2>
      
      <div id="seasonSummary"></div>
      <button class="actionBtn gray" type="button" onclick="archiveCurrentMatch()">Aktuellen Spieltag zur Saison hinzufügen</button>
      <button class="actionBtn gray" type="button" onclick="clearSeason()">Saison zurücksetzen</button>
    </div>
  </section>
</div>

<div id="playerPrompt" class="playerPromptOverlay" aria-hidden="true">
  <div class="playerPromptBox">
    <h3 id="playerPromptTitle">Spielernummer</h3>
    <input class="quickNo" id="playerPromptInput" type="number" inputmode="numeric" placeholder="Nummer">
    <div class="playerPromptActions">
      <button class="actionBtn gray" type="button" onclick="closePlayerPrompt('')">Abbrechen</button>
      <button class="actionBtn blue" type="button" onclick="confirmPlayerPrompt()">OK</button>
    </div>
  </div>
</div>

<script>
const STORAGE_KEY='footballTrackerV18';
const MATCH_HISTORY_KEY='footballTrackerSeasonV18';
const TEAM_NAMES_KEY='footballTrackerTeamNamesV18';
const STAT_DEFS=[
  {key:'goals',title:'Tore',homeId:'hg',awayId:'ag',askPlayer:'homeOnly'},
  {key:'shotsOnTarget',title:'Schüsse aufs Tor',homeId:'hst',awayId:'ast',askPlayer:'both'},
  {key:'shotsOffTarget',title:'Schüsse vorbei',homeId:'hsb',awayId:'asb',askPlayer:'both'},
  {key:'corners',title:'Ecken',homeId:'he',awayId:'ae',askPlayer:'none'},
  {key:'freeKicks',title:'Freistöße',homeId:'hf',awayId:'af',askPlayer:'none'},
  {key:'yellow',title:'Gelbe Karten',homeId:'hy',awayId:'ay',askPlayer:'both'},
  {key:'red',title:'Rote Karten',homeId:'hr',awayId:'ar',askPlayer:'both'},
  {key:'penalties',title:'Elfmeter',homeId:'hep',awayId:'aep',askPlayer:'both'},
  {key:'offsides',title:'Abseits',homeId:'hab',awayId:'aab',askPlayer:'none'},
  {key:'fouls',title:'Fouls',homeId:'hfo',awayId:'afo',askPlayer:'both'}
];
const ALL=STAT_DEFS.flatMap(s=>[s.homeId,s.awayId]);
let mo='idle',tI=null,sec=0,hm=45,hn=1,nsS=0,h1T=0,h2T=0,h1NS=0,h2NS=0,runStartedAt=null,nsStartedAt=null,cs={},hist=[],logs={},players=[],playerPromptResolve=null;
ALL.forEach(id=>cs[id]=0);
STAT_DEFS.forEach(s=>logs[s.key]=[]);
logs.substitutions=[];

function initPlayers(){players=[];for(let i=1;i<=12;i++)players.push({number:String(i),name:''});}
function homeName(){return document.getElementById('tH').value||'Heim'}
function awayName(){return document.getElementById('tAName').value||'Auswärts'}
function isHome(id){return id[0]==='h'}
function nowSec(){return Math.floor(Date.now()/1000)}
function ft2(n){n=Math.max(0,Math.floor(n||0));return String(Math.floor(n/60)).padStart(2,'0')+':'+String(n%60).padStart(2,'0')}
function playerNameByNo(no){const p=players.find(x=>String(x.number).trim()===String(no).trim());return p&&p.name?p.name:''}
function displayPlayer(no){const n=playerNameByNo(no);return n?`#${no} ${n}`:`#${no}`}
function getRegElapsed(){return (mo==='run'&&runStartedAt!==null)?sec+(nowSec()-runStartedAt):sec}
function getNsElapsed(){return (mo==='ns'&&nsStartedAt!==null)?nsS+(nowSec()-nsStartedAt):nsS}
function getBaseTime(){const reg=(mo==='run')?getRegElapsed():sec;return hn===1?reg:(hm*60+reg)}
function getFixedBaseTime(){return hn===1?hm*60:hm*120}
function getDisplayTimeForEvent(){return mo==='ns'?ft2(getFixedBaseTime())+' [+] '+ft2(getNsElapsed()):ft2(getBaseTime())}

function showPage(name){
  ['spieltag','team','saison'].forEach(p=>{
    document.getElementById('page_'+p).classList.toggle('active',p===name);
    document.getElementById('tabBtn_'+p).classList.toggle('active',p===name);
  });
  if(name==='saison') renderSeason();
}

function buildStats(){
  const wrap=document.getElementById('statsWrap'); wrap.innerHTML='';
  STAT_DEFS.forEach(s=>{
    const d=document.createElement('div'); d.className='sec';
    d.innerHTML=`<h2>${s.title}</h2><div class="rw"><span class="rc" id="${s.homeId}">0</span><button class="bh" onclick="addStat('${s.homeId}','${s.key}','${s.askPlayer}')">+</button><button class="ba" onclick="addStat('${s.awayId}','${s.key}','${s.askPlayer}')">+</button><span class="rc" id="${s.awayId}">0</span></div><div class="log" id="log_${s.key}"></div>`;
    wrap.appendChild(d);
  });
}

function renderTeamRows(){
  const body=document.getElementById('teamRows'); body.innerHTML='';
  players.forEach((p,i)=>{
    const tr=document.createElement('tr');
    tr.innerHTML=`<td><input class="playerNo" data-idx="${i}" data-field="number" value="${p.number}"></td><td><input class="playerName" data-idx="${i}" data-field="name" value="${p.name||''}" placeholder="Spielername"></td>`;
    body.appendChild(tr);
  });
}

function savePlayers(alertIt){
  document.querySelectorAll('#teamRows input').forEach(inp=>{players[Number(inp.dataset.idx)][inp.dataset.field]=inp.value.trim();});
  saveState(); renderLogs(); renderSeason(); if(alertIt) alert('Team gespeichert.');
}

function renderTeamSuggestions(){
  const names=JSON.parse(localStorage.getItem(TEAM_NAMES_KEY)||'[]');
  document.getElementById('teamSuggestions').innerHTML=names.map(n=>`<option value="${String(n).replace(/"/g,'&quot;')}">`).join('');
}
function storeTeamSuggestion(name){
  name=(name||'').trim(); if(!name) return;
  let names=JSON.parse(localStorage.getItem(TEAM_NAMES_KEY)||'[]');
  if(!names.includes(name)) names.push(name);
  names.sort((a,b)=>a.localeCompare(b,'de'));
  localStorage.setItem(TEAM_NAMES_KEY,JSON.stringify(names));
  renderTeamSuggestions();
}
function saveTeamNames(){storeTeamSuggestion(document.getElementById('tH').value);storeTeamSuggestion(document.getElementById('tAName').value);saveState();}
function applyColors(){document.documentElement.style.setProperty('--hc',document.getElementById('cH').value);document.documentElement.style.setProperty('--ac',document.getElementById('cA').value);saveState();}
function setButton(text,cls){const b=document.getElementById('btnStart');b.textContent=text;b.className=cls||''}

function renderLogs(){
  STAT_DEFS.forEach(s=>{
    const el=document.getElementById('log_'+s.key);
    el.innerHTML=logs[s.key].map(item=>{
      const txt=item.player ? ' - '+(item.team===awayName() && s.key==='goals' ? '#'+item.player : displayPlayer(item.player)) : '';
      return `<div class="logItem">${item.t} - ${item.team}${txt}</div>`;
    }).join('');
  });
  document.getElementById('log_substitutions').innerHTML = logs.substitutions.map(item=>`<div class="logItem">${item.t} - ${displayPlayer(item.out)} → ${displayPlayer(item.in)}</div>`).join('');
}

function openPlayerPrompt(title, placeholder='Nummer'){
  const overlay=document.getElementById('playerPrompt');
  const input=document.getElementById('playerPromptInput');
  document.getElementById('playerPromptTitle').textContent=title;
  input.value='';
  input.placeholder=placeholder;
  overlay.classList.add('active');
  overlay.setAttribute('aria-hidden','false');
  setTimeout(()=>{input.focus(); input.select();},20);
  return new Promise(resolve=>{playerPromptResolve=resolve;});
}

function closePlayerPrompt(value=''){
  const overlay=document.getElementById('playerPrompt');
  overlay.classList.remove('active');
  overlay.setAttribute('aria-hidden','true');
  if(playerPromptResolve){
    const resolve=playerPromptResolve;
    playerPromptResolve=null;
    resolve(String(value||'').trim());
  }
}

function confirmPlayerPrompt(){
  closePlayerPrompt(document.getElementById('playerPromptInput').value);
}

async function askPlayerFor(id, mode){
  if(mode==='none') return '';
  const home=isHome(id);
  if(mode==='homeOnly' && !home) return await openPlayerPrompt('Gegnerische Spielernummer','Nummer');
  return await openPlayerPrompt('Spielernummer '+(home?'Heim':'Auswärts'),'Nummer');
}

async function addStat(id,category,askMode){
  refreshTimeState();
  const player = await askPlayerFor(id, askMode);
  cs[id]++;
  document.getElementById(id).textContent=cs[id];
  const rec={kind:'counter',id,category,logAdded:false};
  if(askMode!=='none'){
    logs[category].push({t:getDisplayTimeForEvent(),team:isHome(id)?homeName():awayName(),player});
    rec.logAdded=true;
  }
  hist.push(rec); renderLogs(); saveState();
}

function addSubstitution(){
  const outNo=(document.getElementById('swapOut').value||'').trim();
  const inNo=(document.getElementById('swapIn').value||'').trim();
  if(!outNo || !inNo) return;
  logs.substitutions.push({t:getDisplayTimeForEvent(),out:outNo,in:inNo});
  hist.push({kind:'substitution'});
  document.getElementById('swapOut').value='';
  document.getElementById('swapIn').value='';
  renderLogs(); saveState();
}

function uZ(){
  refreshTimeState(); if(!hist.length) return;
  const last=hist.pop();
  if(last.kind==='substitution'){ if(logs.substitutions.length) logs.substitutions.pop(); renderLogs(); saveState(); return; }
  if(last.kind==='counter'&&cs[last.id]>0){cs[last.id]--;document.getElementById(last.id).textContent=cs[last.id];if(last.logAdded&&logs[last.category].length)logs[last.category].pop();}
  renderLogs(); saveState();
}

function stopTicker(){if(tI){clearInterval(tI);tI=null;}}
function refreshTimeState(){
  if(mo==='run'&&runStartedAt!==null){sec=sec+(nowSec()-runStartedAt);runStartedAt=nowSec();if(sec>=hm*60)sec=hm*60;}
  if(mo==='ns'&&nsStartedAt!==null){nsS=nsS+(nowSec()-nsStartedAt);nsStartedAt=nowSec();}
}
function updateLabelAndButton(){
  if(mo==='idle'){document.getElementById('htLabel').textContent='1. Halbzeit';setButton('Start','');}
  else if(mo==='run'){document.getElementById('htLabel').textContent=hn===1?'1. Halbzeit':'2. Halbzeit';setButton('Stop','run');}
  else if(mo==='pau'){document.getElementById('htLabel').textContent=hn===1?'1. Halbzeit pausiert':'2. Halbzeit pausiert';setButton('Weiter','pau');}
  else if(mo==='ns'){document.getElementById('htLabel').textContent=hn===1?'Nachspielzeit 1. Halbzeit':'Nachspielzeit 2. Halbzeit';setButton('Nachspielzeit stoppen','ns');}
  else if(mo==='break'){document.getElementById('htLabel').textContent='Halbzeitpause';setButton('2. Halbzeit starten','next');}
  else if(mo==='done'){document.getElementById('htLabel').textContent='Spiel beendet';setButton('Beendet','done');}
}
function uT(){
  refreshTimeState(); if(mo==='run'&&sec>=hm*60){sec=hm*60;hE(true);return;}
  const tm=document.getElementById('timer'), nL=document.getElementById('nsLabel');
  if(mo==='idle'){tm.textContent='00:00';nL.textContent='';}
  else if(mo==='run'||mo==='pau'){tm.textContent=ft2(getBaseTime());nL.textContent='';}
  else if(mo==='ns'){tm.textContent=ft2(getFixedBaseTime());nL.textContent='[+] '+ft2(getNsElapsed());}
  else if(mo==='break'){tm.textContent=ft2(hm*60);nL.textContent=h1NS>0?'[+] '+ft2(h1NS):'';}
  else if(mo==='done'){tm.textContent=ft2(hm*120);nL.textContent=h2NS>0?'[+] '+ft2(h2NS):'';}
  updateLabelAndButton();
}
function startUITicker(){stopTicker(); if(mo==='run'||mo==='ns') tI=setInterval(()=>{uT();saveState();},250);}
function hE(fromAuto){refreshTimeState();stopTicker();mo='ns';if(!fromAuto)nsS=0;nsStartedAt=nowSec();uT();startUITicker();saveState();}
function finishPeriod(){refreshTimeState();stopTicker();if(mo==='ns'&&nsStartedAt!==null){nsS=getNsElapsed();nsStartedAt=null;} if(hn===1){h1T=hm*60;h1NS=nsS;mo='break';sec=0;nsS=0;}else{h2T=hm*60;h2NS=nsS;mo='done';nsS=h2NS;}uT();saveState();}
function startHalf(halfNo){hn=halfNo;sec=0;nsS=0;runStartedAt=nowSec();nsStartedAt=null;mo='run';document.getElementById('tRow').classList.add('hd');uT();startUITicker();saveState();}
function tA(){refreshTimeState();if(mo==='idle'){hm=parseInt(document.getElementById('hM').value,10)||45;if(hm<1)hm=45;document.getElementById('hM').value=hm;h1T=0;h2T=0;h1NS=0;h2NS=0;startHalf(1);return;}if(mo==='run'){sec=getRegElapsed();runStartedAt=null;mo='pau';uT();stopTicker();saveState();return;}if(mo==='pau'){runStartedAt=nowSec();mo='run';uT();startUITicker();saveState();return;}if(mo==='ns'){finishPeriod();return;}if(mo==='break'){startHalf(2);return;}}

function resetMatchData(){
  mo='idle';tI=null;sec=0;hm=45;hn=1;nsS=0;h1T=0;h2T=0;h1NS=0;h2NS=0;runStartedAt=null;nsStartedAt=null;hist=[];
  ALL.forEach(id=>cs[id]=0); STAT_DEFS.forEach(s=>logs[s.key]=[]); logs.substitutions=[];
}
function rA(){stopTicker();resetMatchData();ALL.forEach(id=>document.getElementById(id).textContent='0');document.getElementById('hM').value='45';document.getElementById('tRow').classList.remove('hd');renderLogs();uT();saveState();}

function playerStatsFromLogs(matchLogs, playerList, matchAway){
  const result={}, map={goals:'Tore',shotsOnTarget:'Schüsse aufs Tor',shotsOffTarget:'Schüsse vorbei',yellow:'Gelbe Karten',red:'Rote Karten',penalties:'Elfmeter',fouls:'Fouls'};
  (playerList||players).forEach(p=>{const no=String(p.number||'').trim();if(no)result[no]={number:no,name:p.name||'',Tore:0,'Schüsse aufs Tor':0,'Schüsse vorbei':0,'Gelbe Karten':0,'Rote Karten':0,Elfmeter:0,Fouls:0};});
  Object.entries(map).forEach(([cat,label])=>{
    (matchLogs[cat]||[]).forEach(item=>{
      if(cat==='goals' && item.team===matchAway) return;
      const no=String(item.player||'').trim(); if(!no) return;
      if(!result[no]) result[no]={number:no,name:'',Tore:0,'Schüsse aufs Tor':0,'Schüsse vorbei':0,'Gelbe Karten':0,'Rote Karten':0,Elfmeter:0,Fouls:0};
      result[no][label]++;
    });
  });
  return Object.values(result).sort((a,b)=>Number(a.number)-Number(b.number));
}

function currentMatchSnapshot(){refreshTimeState();savePlayers(false);return {createdAt:new Date().toISOString(),home:homeName(),away:awayName(),hm,h1T,h1NS,h2T,h2NS,counters:JSON.parse(JSON.stringify(cs)),logs:JSON.parse(JSON.stringify(logs)),players:JSON.parse(JSON.stringify(players))};}
function archiveCurrentMatch(){const snap=currentMatchSnapshot();const list=JSON.parse(localStorage.getItem(MATCH_HISTORY_KEY)||'[]');list.push(snap);localStorage.setItem(MATCH_HISTORY_KEY,JSON.stringify(list));renderSeason();alert('Spieltag zur Saison hinzugefügt.');}
function clearSeason(){if(!confirm('Saison wirklich zurücksetzen?'))return;localStorage.removeItem(MATCH_HISTORY_KEY);renderSeason();}

function renderSeason(){
  const host=document.getElementById('seasonSummary'); const matches=JSON.parse(localStorage.getItem(MATCH_HISTORY_KEY)||'[]');
  if(!matches.length){host.innerHTML='<div class="subtle">Noch keine Spiele in der Saison gespeichert.</div>';return;}
  const totals={};
  matches.forEach(m=>{
    playerStatsFromLogs(m.logs,m.players,m.away).forEach(r=>{
      if(!totals[r.number]) totals[r.number]={...r};
      else ['Tore','Schüsse aufs Tor','Schüsse vorbei','Gelbe Karten','Rote Karten','Elfmeter','Fouls'].forEach(k=>totals[r.number][k]+=r[k]);
    });
  });
  let html=`<div class="seasonCard"><div class="seasonHead">Spiele in der Saison: <strong>${matches.length}</strong></div>`;
  matches.forEach((m,i)=>html+=`<div class="subtle" style="margin-bottom:6px">${i+1}. ${m.home} - ${m.away}</div>`);
  html+=`<div style="overflow:auto"><table class="seasonGrid"><thead><tr><th>Nr.</th><th>Name</th><th>Tore</th><th>Schüsse aufs Tor</th><th>Schüsse vorbei</th><th>Gelbe Karten</th><th>Rote Karten</th><th>Elfmeter</th><th>Fouls</th></tr></thead><tbody>`;
  Object.values(totals).sort((a,b)=>Number(a.number)-Number(b.number)).forEach(r=>{html+=`<tr><td>${r.number}</td><td class="name">${r.name||''}</td><td>${r['Tore']}</td><td>${r['Schüsse aufs Tor']}</td><td>${r['Schüsse vorbei']}</td><td>${r['Gelbe Karten']}</td><td>${r['Rote Karten']}</td><td>${r['Elfmeter']}</td><td>${r['Fouls']}</td></tr>`;});
  html+='</tbody></table></div></div>'; host.innerHTML=html;
}

function exportWorkbook(){
  savePlayers(false);
  const snap=currentMatchSnapshot(), wb=XLSX.utils.book_new();
  const gegentore = snap.counters.ag||0;
  const spieltag=[['Spieltag',''],['Heimmannschaft',snap.home],['Auswärtsmannschaft',snap.away],['Reguläre Spielzeit pro Halbzeit',ft2(snap.hm*60)],['1. Halbzeit regulär',ft2(snap.h1T)],['1. Halbzeit Nachspielzeit',ft2(snap.h1NS)],['2. Halbzeit regulär',ft2(snap.h2T)],['2. Halbzeit Nachspielzeit',ft2(snap.h2NS)],['',''],['Kategorie','Wert'],['Gegentore',gegentore]];
  STAT_DEFS.forEach(s=>{spieltag.push([s.title+' Heim',snap.counters[s.homeId]||0]);spieltag.push([s.title+' Auswärts',snap.counters[s.awayId]||0]);});
  spieltag.push(['',''],['Dokumentierte Ereignisse','']);
  STAT_DEFS.forEach(s=>{
    spieltag.push([s.title,'']);
    if(!(snap.logs[s.key]||[]).length) spieltag.push(['Keine Einträge','']);
    else {
      spieltag.push(['Zeitpunkt','Beschreibung']);
      (snap.logs[s.key]||[]).forEach(item=>{
        let desc=item.team;
        if(item.player){
          desc += ' - ' + ((s.key==='goals' && item.team===snap.away) ? ('#'+item.player) : displayPlayer(item.player));
        }
        spieltag.push([item.t,desc]);
      });
    }
    spieltag.push(['','']);
  });
  spieltag.push(['Auswechslungen','']);
  if(!snap.logs.substitutions.length) spieltag.push(['Keine Einträge','']);
  else {
    spieltag.push(['Zeitpunkt','Beschreibung']);
    snap.logs.substitutions.forEach(item=>spieltag.push([item.t, `${displayPlayer(item.out)} → ${displayPlayer(item.in)}`]));
  }
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(spieltag),'Spieltag');

  const teamRows=[['Nr.','Name','Tore','Schüsse aufs Tor','Schüsse vorbei','Gelbe Karten','Rote Karten','Elfmeter','Fouls']];
  playerStatsFromLogs(snap.logs,snap.players,snap.away).forEach(r=>teamRows.push([r.number,r.name,r['Tore'],r['Schüsse aufs Tor'],r['Schüsse vorbei'],r['Gelbe Karten'],r['Rote Karten'],r['Elfmeter'],r['Fouls']]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(teamRows),'Mein Team');

  const seasonRows=[['Nr.','Name','Tore','Schüsse aufs Tor','Schüsse vorbei','Gelbe Karten','Rote Karten','Elfmeter','Fouls']];
  const totals={};
  JSON.parse(localStorage.getItem(MATCH_HISTORY_KEY)||'[]').concat([snap]).forEach(m=>{
    playerStatsFromLogs(m.logs,m.players,m.away).forEach(r=>{
      if(!totals[r.number]) totals[r.number]={...r};
      else ['Tore','Schüsse aufs Tor','Schüsse vorbei','Gelbe Karten','Rote Karten','Elfmeter','Fouls'].forEach(k=>totals[r.number][k]+=r[k]);
    });
  });
  Object.values(totals).sort((a,b)=>Number(a.number)-Number(b.number)).forEach(r=>seasonRows.push([r.number,r.name,r['Tore'],r['Schüsse aufs Tor'],r['Schüsse vorbei'],r['Gelbe Karten'],r['Rote Karten'],r['Elfmeter'],r['Fouls']]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(seasonRows),'Saison');
  XLSX.writeFile(wb,'spieltag_export.xlsx');
}

function saveState(){
  const state={mo,sec,hm,hn,nsS,h1T,h2T,h1NS,h2NS,runStartedAt,nsStartedAt,cs,hist,logs,players,teamH:document.getElementById('tH').value,teamA:document.getElementById('tAName').value,colorH:document.getElementById('cH').value,colorA:document.getElementById('cA').value};
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
}
function loadState(){
  initPlayers();
  const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return;
  try{
    const s=JSON.parse(raw); mo=s.mo||'idle';sec=s.sec||0;hm=s.hm||45;hn=s.hn||1;nsS=s.nsS||0;h1T=s.h1T||0;h2T=s.h2T||0;h1NS=s.h1NS||0;h2NS=s.h2NS||0;runStartedAt=s.runStartedAt==null?null:s.runStartedAt;nsStartedAt=s.nsStartedAt==null?null:s.nsStartedAt;
    if(s.cs) Object.keys(cs).forEach(k=>cs[k]=s.cs[k]||0);
    hist=Array.isArray(s.hist)?s.hist:[];
    if(s.logs){logs=s.logs; if(!logs.substitutions) logs.substitutions=[];}
    if(Array.isArray(s.players)&&s.players.length) players=s.players;
    document.getElementById('tH').value=s.teamH||'';document.getElementById('tAName').value=s.teamA||'';document.getElementById('cH').value=s.colorH||'#c2185b';document.getElementById('cA').value=s.colorA||'#1e88e5';document.getElementById('hM').value=hm;
  }catch(e){console.error(e);}
}

buildStats();
loadState();
renderTeamRows();
renderTeamSuggestions();
ALL.forEach(id=>document.getElementById(id).textContent=cs[id]);
applyColors(); renderLogs();
if(mo!=='idle') document.getElementById('tRow').classList.add('hd');
uT(); startUITicker(); renderSeason();
window.addEventListener('beforeunload',()=>{savePlayers(false);saveState();});
document.addEventListener('visibilitychange',()=>{if(document.hidden){savePlayers(false);saveState();}});
</script>
